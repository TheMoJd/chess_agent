services:
  backend:
    build:
      context: ./backend
    container_name: chess_agent_backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    networks:
      - chess_net
    depends_on:
      milvus:
        condition: service_healthy
    restart: unless-stopped

  # === Milvus (RAG vector DB) ===
  # Setup standalone : 3 conteneurs (etcd + minio + milvus). C'est le pattern
  # officiel Milvus, plus robuste que l'all-in-one.
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: chess_agent_etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: >
      etcd
      -advertise-client-urls=http://etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    networks:
      - chess_net
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    container_name: chess_agent_minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - minio_data:/minio_data
    networks:
      - chess_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4.13
    container_name: chess_agent_milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "9091:9091"
    networks:
      - chess_net
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      start_period: 90s
      retries: 5
    restart: unless-stopped

networks:
  chess_net:
    driver: bridge

volumes:
  etcd_data:
  minio_data:
  milvus_data:
