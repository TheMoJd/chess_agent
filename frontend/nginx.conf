server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Resolver Docker pour la résolution DNS des services sur le réseau interne.
  # 127.0.0.11 est le DNS embarqué Docker — sans ça, nginx tente une résolution
  # statique au démarrage et plante si le service n'est pas encore up.
  resolver 127.0.0.11 valid=30s;

  # Proxy API vers le service backend du compose. Utilisé en LOCAL DOCKER : la
  # SPA build prod tape /api/v1/* (apiBaseUrl relatif), nginx forwarde ici.
  # Sur VPS, Caddy intercepte /api/* avant nous → ce bloc n'est jamais touché,
  # donc aucune régression. La variable $backend_upstream force un re-resolve
  # au runtime (vs un upstream statique cassé si backend est down au boot).
  location /api/ {
    set $backend_upstream http://backend:8000;
    proxy_pass $backend_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Le /chat de l'agent peut prendre 5-30s (LLM + tools). Default nginx = 60s,
    # OK pour notre timeout client à 60s côté Angular.
    proxy_read_timeout 90s;
    proxy_connect_timeout 10s;
  }

  # SPA fallback : toute route inconnue renvoie index.html (Angular router gère la suite)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache long sur les assets versionnés (Angular ajoute un hash dans le filename)
  location ~* \.(js|css|woff2?|png|jpg|svg)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Health check (utile pour Caddy upstream / monitoring)
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
