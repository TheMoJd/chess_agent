server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback : toute route inconnue renvoie index.html (Angular router gère la suite)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache long sur les assets versionnés (Angular ajoute un hash dans le filename)
  location ~* \.(js|css|woff2?|png|jpg|svg)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Health check (utile pour Caddy upstream / monitoring)
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
